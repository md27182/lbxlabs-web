<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaussian Splatting Pipeline Priorities</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f2f1ee;
    --border: #dddbd6;
    --border2: #c8c5be;
    --text: #1a1916;
    --text-dim: #6b6860;
    --text-dimmer: #a9a79f;
    --accent: #1a3a5c;
    --accent-hover: #22527d;
    --moma: #a02030;
    --smithsonian: #2a5c3a;
    --nga: #7a5a18;
    --lbx: #1a3a5c;
    --danger: #b83030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--text);
    padding: 28px 56px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    max-width: 1280px;
    margin: 0 auto;
  }

  .title-block h1 {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 21px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
    line-height: 1.25;
  }

  .title-block .subtitle {
    font-size: 12px;
    color: var(--text-dimmer);
    font-weight: 400;
    margin-top: 3px;
  }

  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 2px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn.cancel { color: var(--text-dimmer); }
  .btn.cancel:hover { color: var(--danger); border-color: var(--danger); }

  /* Institution badge */
  .inst-badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    vertical-align: middle;
    white-space: nowrap;
  }
  .inst-lbx   { background: #e6edf5; color: var(--lbx);  border: 1px solid #b8cce0; }
  .inst-moma  { background: #f5e6e8; color: var(--moma);  border: 1px solid #d9aaae; }
  .inst-smith { background: #e6f0e9; color: var(--smithsonian); border: 1px solid #a8c8b0; }
  .inst-nga   { background: #f5f0e2; color: var(--nga);   border: 1px solid #d4c090; }

  /* ─── MAIN ─── */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 44px 56px;
  }

  .section { margin-bottom: 52px; }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  /* ─── TABLE HEADER ─── */
  .table-header {
    display: grid;
    grid-template-columns: 1fr 90px 90px 90px 72px;
    gap: 8px;
    padding: 5px 10px 5px 14px;
    margin-bottom: 4px;
  }

  .col-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    text-align: center;
    color: var(--text-dimmer);
  }

  .col-label.col-moma   { color: var(--moma); }
  .col-label.col-smith  { color: var(--smithsonian); }
  .col-label.col-nga    { color: var(--nga); }

  /* ─── ITEM ─── */
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 5px;
    overflow: hidden;
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  .item:hover { border-color: var(--border2); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

  .item-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 90px 72px;
    gap: 8px;
    align-items: center;
    padding: 10px 10px 10px 14px;
    min-height: 46px;
  }

  .phrase-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    min-width: 0;
  }

  .toggle-icon {
    color: var(--text-dimmer);
    font-size: 9px;
    flex-shrink: 0;
    transition: transform 0.18s;
    width: 10px;
  }

  .toggle-icon.open { transform: rotate(90deg); }

  .phrase-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rating-cell {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .rating-select {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-dim);
    padding: 4px 4px;
    width: 54px;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    appearance: none;
    -webkit-appearance: none;
  }

  .rating-select:hover, .rating-select:focus {
    outline: none;
    border-color: var(--border2);
    background: var(--surface);
  }

  .rating-select.rated-moma   { background: #f5e6e8; border-color: #d9aaae; color: var(--moma); }
  .rating-select.rated-smith  { background: #e6f0e9; border-color: #a8c8b0; color: var(--smithsonian); }
  .rating-select.rated-nga    { background: #f5f0e2; border-color: #d4c090; color: var(--nga); }

  /* Action buttons cell */
  .action-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 2px;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dimmer);
    font-size: 13px;
    padding: 5px 6px;
    border-radius: 2px;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text-dim); }
  .icon-btn.edit-btn:hover { color: var(--accent); background: #eef3f8; }
  .icon-btn.delete-btn:hover { color: var(--danger); background: #faeaea; }

  /* Description panel */
  .item-desc {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s ease;
  }

  .item-desc.open { max-height: 600px; }

  .desc-content {
    padding: 14px 16px 16px 32px;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.65;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .desc-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  /* Inline edit form inside description */
  .inline-edit {
    display: none;
    padding: 14px 16px 16px 32px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .inline-edit.visible { display: block; }

  .inline-edit .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .inline-edit .form-field { display: flex; flex-direction: column; gap: 4px; }

  .inline-edit .form-field label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }

  .inline-edit input,
  .inline-edit select,
  .inline-edit textarea {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 2px;
    color: var(--text);
    padding: 7px 10px;
    transition: border-color 0.12s;
    width: 100%;
  }

  .inline-edit input:focus,
  .inline-edit select:focus,
  .inline-edit textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .inline-edit textarea { resize: vertical; min-height: 68px; line-height: 1.5; }
  .inline-edit .form-full { grid-column: 1 / -1; }

  .inline-edit .form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ─── ADD FORM ─── */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 18px;
    margin-top: 10px;
    display: none;
  }

  .add-form.visible { display: block; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-field { display: flex; flex-direction: column; gap: 5px; }

  .form-field label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }

  .form-input, .form-select, .form-textarea {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 2px;
    color: var(--text);
    padding: 8px 10px;
    transition: border-color 0.12s;
    width: 100%;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .form-full { grid-column: 1 / -1; }

  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ─── ADD TRIGGER ─── */
  .add-trigger {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px dashed var(--border2);
    border-radius: 2px;
    cursor: pointer;
    color: var(--text-dimmer);
    font-size: 13px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 500;
    transition: all 0.12s;
    margin-top: 8px;
    background: none;
    width: 100%;
    text-align: left;
  }

  .add-trigger:hover { border-color: var(--accent); color: var(--accent); background: #eef3f8; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="title-block">
      <h1>Gaussian Splatting Pipeline Priorities</h1>
      <div class="subtitle">Collaborative prioritization — cross-institution working group</div>
    </div>
    <div class="header-controls">
      <button class="btn" onclick="collapseAll()">Collapse All</button>
      <button class="btn" onclick="expandAll()">Expand All</button>
    </div>
  </div>
</header>

<main>
  <!-- SECTION 1 -->
  <div class="section" id="section-processing">
    <div class="section-header">
      <div class="section-title">Processing Improvements</div>
    </div>
    <div class="table-header">
      <div class="col-label" style="text-align:left;">Item</div>
      <div class="col-label col-moma">MoMA</div>
      <div class="col-label col-smith">Smithsonian</div>
      <div class="col-label col-nga">NGA</div>
      <div></div>
    </div>
    <div class="items-list" id="list-processing"></div>
    <button class="add-trigger" onclick="showForm('processing')">+ Add item</button>
    <div class="add-form" id="form-processing">
      <div class="form-grid">
        <div class="form-field">
          <label>Phrase / Title</label>
          <input class="form-input" id="inp-phrase-processing" type="text" placeholder="Enter a short phrase…">
        </div>
        <div class="form-field">
          <label>Your Institution</label>
          <select class="form-select" id="inp-inst-processing">
            <option value="">— Select institution —</option>
            <option value="lbx">lbxlabs (Mark)</option>
            <option value="moma">MoMA</option>
            <option value="smith">Smithsonian</option>
            <option value="nga">NGA</option>
          </select>
        </div>
        <div class="form-field form-full">
          <label>Description (optional)</label>
          <textarea class="form-textarea" id="inp-desc-processing" placeholder="Provide more context or details…"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn cancel" onclick="hideForm('processing')">Cancel</button>
        <button class="btn primary" onclick="addItem('processing')">Add Item</button>
      </div>
    </div>
  </div>

  <!-- SECTION 2 -->
  <div class="section" id="section-useful">
    <div class="section-header">
      <div class="section-title">Making the Splats Useful</div>
    </div>
    <div class="table-header">
      <div class="col-label" style="text-align:left;">Item</div>
      <div class="col-label col-moma">MoMA</div>
      <div class="col-label col-smith">Smithsonian</div>
      <div class="col-label col-nga">NGA</div>
      <div></div>
    </div>
    <div class="items-list" id="list-useful"></div>
    <button class="add-trigger" onclick="showForm('useful')">+ Add item</button>
    <div class="add-form" id="form-useful">
      <div class="form-grid">
        <div class="form-field">
          <label>Phrase / Title</label>
          <input class="form-input" id="inp-phrase-useful" type="text" placeholder="Enter a short phrase…">
        </div>
        <div class="form-field">
          <label>Your Institution</label>
          <select class="form-select" id="inp-inst-useful">
            <option value="">— Select institution —</option>
            <option value="lbx">lbxlabs (Mark)</option>
            <option value="moma">MoMA</option>
            <option value="smith">Smithsonian</option>
            <option value="nga">NGA</option>
          </select>
        </div>
        <div class="form-field form-full">
          <label>Description (optional)</label>
          <textarea class="form-textarea" id="inp-desc-useful" placeholder="Provide more context or details…"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn cancel" onclick="hideForm('useful')">Cancel</button>
        <button class="btn primary" onclick="addItem('useful')">Add Item</button>
      </div>
    </div>
  </div>
</main>

<script>
  const INST_META = {
    lbx:   { label: 'lbxlabs (Mark)', cls: 'inst-lbx'  },
    moma:  { label: 'MoMA',           cls: 'inst-moma'  },
    smith: { label: 'Smithsonian',    cls: 'inst-smith' },
    nga:   { label: 'NGA',            cls: 'inst-nga'   },
  };

  const data = { processing: {}, useful: {} };
  let counter = 0;
  function uid() { return 'item-' + (++counter); }

  /* ─── ADD FORM ─── */
  function showForm(section) {
    document.getElementById('form-' + section).classList.add('visible');
    document.getElementById('inp-phrase-' + section).focus();
  }

  function hideForm(section) {
    document.getElementById('form-' + section).classList.remove('visible');
    ['phrase','inst','desc'].forEach(f => {
      const el = document.getElementById(`inp-${f}-${section}`);
      if (el) el.value = '';
    });
  }

  function addItem(section) {
    const phrase = document.getElementById('inp-phrase-' + section).value.trim();
    const inst   = document.getElementById('inp-inst-' + section).value;
    const desc   = document.getElementById('inp-desc-' + section).value.trim();
    if (!phrase) { alert('Please enter a phrase.'); return; }
    if (!inst)   { alert('Please select your institution.'); return; }
    const id = uid();
    data[section][id] = { phrase, desc, institution: inst, ratings: { moma: '', smith: '', nga: '' } };
    renderItem(section, id);
    hideForm(section);
  }

  /* ─── RENDER ─── */
  function renderItem(section, id) {
    const list = document.getElementById('list-' + section);
    const d = data[section][id];
    const meta = INST_META[d.institution];
    const el = document.createElement('div');
    el.className = 'item';
    el.id = 'el-' + id;
    el.innerHTML = itemHTML(section, id, d, meta);
    applyRatingStyles(id, d.ratings);
    list.appendChild(el);
  }

  function itemHTML(section, id, d, meta) {
    return `
      <div class="item-row">
        <div class="phrase-cell" onclick="toggleDesc('${id}')">
          <span class="toggle-icon" id="icon-${id}">▶</span>
          <span class="phrase-text" id="phrase-text-${id}">${escHtml(d.phrase)}</span>
        </div>
        <div class="rating-cell">
          <select class="rating-select" id="rate-moma-${id}" onchange="saveRating('${id}','moma',this)">
            ${ratingOptions(d.ratings.moma)}
          </select>
        </div>
        <div class="rating-cell">
          <select class="rating-select" id="rate-smith-${id}" onchange="saveRating('${id}','smith',this)">
            ${ratingOptions(d.ratings.smith)}
          </select>
        </div>
        <div class="rating-cell">
          <select class="rating-select" id="rate-nga-${id}" onchange="saveRating('${id}','nga',this)">
            ${ratingOptions(d.ratings.nga)}
          </select>
        </div>
        <div class="action-cell">
          <button class="icon-btn edit-btn" title="Edit" onclick="startEdit('${section}','${id}')">✎</button>
          <button class="icon-btn delete-btn" title="Remove" onclick="removeItem('${section}','${id}')">✕</button>
        </div>
      </div>
      <div class="item-desc" id="desc-${id}">
        <div class="desc-content" id="desc-content-${id}">
          <div class="desc-meta">
            <span class="inst-badge ${meta.cls}">${escHtml(meta.label)}</span>
          </div>
          <div id="desc-text-${id}">${d.desc ? escHtml(d.desc).replace(/\n/g,'<br>') : '<em style="color:var(--text-dimmer)">No description provided.</em>'}</div>
        </div>
        <div class="inline-edit" id="edit-${id}">
          <div class="form-grid">
            <div class="form-field">
              <label>Phrase / Title</label>
              <input type="text" id="edit-phrase-${id}" value="${escHtml(d.phrase)}">
            </div>
            <div class="form-field">
              <label>Institution</label>
              <select id="edit-inst-${id}">
                <option value="lbx"  ${d.institution==='lbx'  ?'selected':''}>lbxlabs (Mark)</option>
                <option value="moma" ${d.institution==='moma' ?'selected':''}>MoMA</option>
                <option value="smith"${d.institution==='smith'?'selected':''}>Smithsonian</option>
                <option value="nga"  ${d.institution==='nga'  ?'selected':''}>NGA</option>
              </select>
            </div>
            <div class="form-field form-full">
              <label>Description</label>
              <textarea id="edit-desc-${id}" rows="3">${escHtml(d.desc)}</textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn cancel" onclick="cancelEdit('${id}')">Cancel</button>
            <button class="btn primary" onclick="saveEdit('${section}','${id}')">Save Changes</button>
          </div>
        </div>
      </div>`;
  }

  /* ─── EDIT ─── */
  function startEdit(section, id) {
    // Expand the description panel if not already open
    const desc = document.getElementById('desc-' + id);
    const icon = document.getElementById('icon-' + id);
    desc.classList.add('open');
    icon.classList.add('open');

    // Hide read view, show edit form
    document.getElementById('desc-content-' + id).style.display = 'none';
    document.getElementById('edit-' + id).classList.add('visible');
    document.getElementById('edit-phrase-' + id).focus();
  }

  function cancelEdit(id) {
    document.getElementById('desc-content-' + id).style.display = '';
    document.getElementById('edit-' + id).classList.remove('visible');
  }

  function saveEdit(section, id) {
    const phrase = document.getElementById('edit-phrase-' + id).value.trim();
    const inst   = document.getElementById('edit-inst-' + id).value;
    const desc   = document.getElementById('edit-desc-' + id).value.trim();
    if (!phrase) { alert('Please enter a phrase.'); return; }

    // Update data
    data[section][id].phrase = phrase;
    data[section][id].institution = inst;
    data[section][id].desc = desc;

    // Update DOM
    const meta = INST_META[inst];
    document.getElementById('phrase-text-' + id).textContent = phrase;
    document.getElementById('desc-text-' + id).innerHTML = desc
      ? escHtml(desc).replace(/\n/g,'<br>')
      : '<em style="color:var(--text-dimmer)">No description provided.</em>';

    // Update badge in desc-meta
    const badgeEl = document.querySelector(`#desc-content-${id} .inst-badge`);
    if (badgeEl) {
      badgeEl.className = 'inst-badge ' + meta.cls;
      badgeEl.textContent = meta.label;
    }

    cancelEdit(id);
  }

  /* ─── RATINGS ─── */
  function ratingOptions(current) {
    let opts = '<option value="">—</option>';
    for (let i = 1; i <= 10; i++) {
      opts += `<option value="${i}" ${current == i ? 'selected' : ''}>${i}</option>`;
    }
    return opts;
  }

  function saveRating(id, col, selectEl) {
    let section;
    for (const s of ['processing','useful']) { if (data[s][id]) { section = s; break; } }
    data[section][id].ratings[col] = selectEl.value;
    applyRatingStyles(id, data[section][id].ratings);
  }

  function applyRatingStyles(id, ratings) {
    const map = { moma: 'rated-moma', smith: 'rated-smith', nga: 'rated-nga' };
    for (const [col, cls] of Object.entries(map)) {
      const el = document.getElementById(`rate-${col}-${id}`);
      if (!el) continue;
      el.classList.remove('rated-moma','rated-smith','rated-nga');
      if (ratings[col]) el.classList.add(cls);
    }
  }

  /* ─── TOGGLE / COLLAPSE / EXPAND ─── */
  function toggleDesc(id) {
    // If edit form is open, don't collapse
    if (document.getElementById('edit-' + id).classList.contains('visible')) return;
    const desc = document.getElementById('desc-' + id);
    const icon = document.getElementById('icon-' + id);
    const isOpen = desc.classList.contains('open');
    desc.classList.toggle('open', !isOpen);
    icon.classList.toggle('open', !isOpen);
  }

  function collapseAll() {
    // Cancel any open edits first
    document.querySelectorAll('.inline-edit.visible').forEach(el => {
      const id = el.id.replace('edit-','');
      cancelEdit(id);
    });
    document.querySelectorAll('.item-desc').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.toggle-icon').forEach(i => i.classList.remove('open'));
  }

  function expandAll() {
    document.querySelectorAll('.item-desc').forEach(d => d.classList.add('open'));
    document.querySelectorAll('.toggle-icon').forEach(i => i.classList.add('open'));
  }

  /* ─── REMOVE ─── */
  function removeItem(section, id) {
    delete data[section][id];
    const el = document.getElementById('el-' + id);
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.18s'; setTimeout(() => el.remove(), 200); }
  }

  /* ─── UTILS ─── */
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.matches('.form-input')) {
      addItem(e.target.id.replace('inp-phrase-',''));
    }
    if (e.key === 'Escape') {
      document.querySelectorAll('.inline-edit.visible').forEach(el => {
        cancelEdit(el.id.replace('edit-',''));
      });
    }
  });
</script>
</body>
</html>
